name: Build ImmortalWrt for DoorNet2

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'ImmortalWrt 版本'
        required: true
        default: 'master'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  BUILD_TARGET: rockchip
  BUILD_SUBTARGET: armv8
  DEVICE: embedfire_doornet2

jobs:
  build:
    name: 🏗️ Build ImmortalWrt for DoorNet2
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || github.event_name == 'workflow_dispatch'

    steps:
      - name: 🔍 Checkout DoorNet2 adaptation
        uses: actions/checkout@v4
        with:
          path: doornet2-adapt

      - name: 📦 Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-distutils python3-setuptools rsync unzip zlib1g-dev \
            file wget curl qemu-utils cpio upx patchelf bc

      - name: 🧬 Clone ImmortalWrt source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH immortalwrt
          ls -la immortalwrt/target/linux/rockchip/

      - name: 🩹 Apply DoorNet2 adaptations
        run: |
          # Copy DTS file
          mkdir -p immortalwrt/target/linux/rockchip/files-6.18/arch/arm64/boot/dts/rockchip
          cp doornet2-adapt/target/linux/rockchip/files-6.18/arch/arm64/boot/dts/rockchip/* \
             immortalwrt/target/linux/rockchip/files-6.18/arch/arm64/boot/dts/rockchip/
          # Copy image Makefile  
          cp doornet2-adapt/target/linux/rockchip/image/Makefile \
             immortalwrt/target/linux/rockchip/image/Makefile
          # Copy armv8 configs
          cp doornet2-adapt/target/linux/rockchip/armv8/target.mk \
             immortalwrt/target/linux/rockchip/armv8/target.mk
          # Copy base-files
          cp -r doornet2-adapt/target/linux/rockchip/armv8/base-files/* \
             immortalwrt/target/linux/rockchip/armv8/base-files/
          # Copy kernel patches
          cp doornet2-adapt/target/linux/rockchip/patches-6.18/* \
             immortalwrt/target/linux/rockchip/patches-6.18/ 2>/dev/null || true
          # Copy U-Boot patches  
          mkdir -p immortalwrt/package/boot/uboot-rockchip/patches
          cp doornet2-adapt/package/boot/uboot-rockchip/patches/* \
             immortalwrt/package/boot/uboot-rockchip/patches/
          # Config
          cp doornet2-adapt/docs/diffconfig immortalwrt/.config
          echo "✅ Patches applied"

      - name: 🔄 Update & install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Configure firmware
        run: |
          cd immortalwrt
          make defconfig
          echo "=== DEVICE ==="
          grep "DEVICE_embedfire_doornet2" .config || echo "WARNING: Device config not found - check make defconfig"
          echo "=== PACKAGES ==="
          grep "CONFIG_PACKAGE" .config | head -20

      - name: 🏗️ Download prerequisite packages
        run: |
          cd immortalwrt
          make download -j$(nproc) 2>&1 | tail -20

      - name: 🏗️ Build (verbose on failure)
        run: |
          cd immortalwrt
          set -o pipefail
          make -j$(nproc) 2>&1 | tail -100 || \
            (echo "=== BUILD FAILED - Retrying with V=s ===" && \
             make -j1 V=s 2>&1 | tail -200)

      - name: 📦 Collect firmware artifacts
        if: always()
        run: |
          mkdir -p firmware
          echo "=== Checking build output ==="
          ls -la immortalwrt/bin/targets/ 2>/dev/null || echo "No bin/targets dir"
          find immortalwrt/bin/targets/ -type f 2>/dev/null | head -20 || echo "No files found"
          find immortalwrt/bin/targets/ -name "*embedfire*" -exec cp -v {} firmware/ \; 2>/dev/null || true
          find immortalwrt/bin/targets/ -name "*doornet2*" -exec cp -v {} firmware/ \; 2>/dev/null || true
          find immortalwrt/bin/targets/ -name "*.manifest" -exec cp -v {} firmware/ \; 2>/dev/null || true
          find immortalwrt/bin/targets/ -name "sha256sums" -exec cp -v {} firmware/ \; 2>/dev/null || true
          ls -lh firmware/ 2>/dev/null || echo "No firmware generated"

      - name: 📤 Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-doornet2-firmware
          path: firmware/
          retention-days: 30

      - name: 📝 Generate build summary
        if: always()
        run: |
          echo "## 🎯 ImmortalWrt for DoorNet2 Build Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d firmware ] && [ "$(ls -A firmware 2>/dev/null)" ]; then
            echo "✅ **Build Successful!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            for f in firmware/*; do
              echo "| \`$(basename $f)\` | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📥 到 **Summary** 页 → **Artifacts** 下载" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build Failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看 Actions 日志获取详细错误信息:" >> $GITHUB_STEP_SUMMARY
            echo "https://github.com/plumager/immortalwrt-doornet2/actions" >> $GITHUB_STEP_SUMMARY
          fi
